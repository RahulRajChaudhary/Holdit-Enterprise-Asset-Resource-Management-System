  <path d="M340 288 L340 314 L135 314 L135 336" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="288" x2="340" y2="336" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M340 288 L340 314 L545 314 L545 336" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

