  <text class="th" x="340" y="159" text-anchor="middle" fill="#085041">Organization setup</text>
  <text class="ts" x="340" y="179" text-anchor="middle" fill="#0F6E56">Departments, categories, roles</text>

  <line x1="340" y1="192" x2="340" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

