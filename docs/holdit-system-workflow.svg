<svg width="680" height="628" viewBox="0 0 680 628" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Holdit system workflow</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
