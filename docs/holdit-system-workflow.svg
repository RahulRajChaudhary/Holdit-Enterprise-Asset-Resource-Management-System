    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; }
  </style>

  <rect x="230" y="40" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text class="th" x="340" y="63" text-anchor="middle" fill="#444441">Login and signup</text>
  <text class="ts" x="340" y="83" text-anchor="middle" fill="#5F5E5A">Signup = employee only</text>

  <line x1="340" y1="96" x2="340" y2="132" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

