<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Holdit asset lifecycle</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; }
  </style>

  <rect x="40" y="60" width="150" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text class="th" x="115" y="83" text-anchor="middle" fill="#27500A">Available</text>
  <text class="ts" x="115" y="103" text-anchor="middle" fill="#3B6D11">In stock, bookable</text>

  <line x1="190" y1="88" x2="256" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="60" width="150" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="335" y="83" text-anchor="middle" fill="#3C3489">Reserved</text>
  <text class="ts" x="335" y="103" text-anchor="middle" fill="#534AB7">Transfer approved</text>

  <line x1="410" y1="88" x2="476" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="480" y="60" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text class="th" x="560" y="83" text-anchor="middle" fill="#0C447C">Allocated</text>
  <text class="ts" x="560" y="103" text-anchor="middle" fill="#185FA5">Held by employee</text>

  <text class="ts" x="560" y="144" text-anchor="middle" fill="#5F5E5A">&#8635; return reverts to available</text>

  <rect x="40" y="190" width="190" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text class="th" x="135" y="213" text-anchor="middle" fill="#633806">Under maintenance</text>
  <text class="ts" x="135" y="233" text-anchor="middle" fill="#854F0B">On approval, auto flip</text>

  <line x1="100" y1="116" x2="100" y2="186" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="186" x2="140" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="420" y="190" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text class="th" x="530" y="213" text-anchor="middle" fill="#444441">Lost, retired, disposed</text>
  <text class="ts" x="530" y="233" text-anchor="middle" fill="#5F5E5A">Terminal, audit or admin</text>

  <line x1="530" y1="116" x2="530" y2="186" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text class="ts" x="340" y="292" text-anchor="middle" fill="#5F5E5A">Only meaningful transitions allowed &#8212; a disposed asset can never be allocated</text>
</svg>
